{% extends 'store/base.html' %}
{% block content %}
<div class="form-card">
  <h1>Welcome Back!</h1>
  <p>Login to your MyShop account</p>
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" required placeholder="Enter your username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required placeholder="Enter your password">
    </div>
    <button type="submit" class="btn btn-red" style="width:100%;padding:13px;font-size:1rem;margin-top:0.5rem;">
      Login
    </button>
  </form>
  <p style="text-align:center;margin-top:1.5rem;font-size:0.9rem;color:#888;">
    Don't have an account? <a href="{% url 'register' %}" style="color:#e94560;font-weight:600;">Register here</a>
  </p>
</div>
{% endblock %}
