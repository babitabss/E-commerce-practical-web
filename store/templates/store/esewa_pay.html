<!DOCTYPE html>
<html>
<head>
  <title>Redirecting to eSewa...</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f0f2f5;
      flex-direction: column;
      gap: 1rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #eee;
      border-top: 4px solid #60bb46;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #666; font-size: 1rem; }
    .esewa-logo { color: #60bb46; font-size: 1.5rem; font-weight: bold; }
  </style>
</head>
<body>
  <div class="esewa-logo">eSewa</div>
  <div class="spinner"></div>
  <p>Redirecting to eSewa payment...</p>

  {% if esewa_url == '/payment/mock-gateway/' %}
  <form id="esewa_form" action="{{ esewa_url }}" method="POST">
    {% csrf_token %}
    {% for key, value in esewa_data.items %}
      <input type="hidden" name="{{ key }}" value="{{ value }}">
    {% endfor %}
  </form>
  {% else %}
  <form id="esewa_form" action="{{ esewa_url }}" method="POST">
    {% for key, value in esewa_data.items %}
      <input type="hidden" name="{{ key }}" value="{{ value }}">
    {% endfor %}
  </form>
  {% endif %}

  <script>
    setTimeout(function() {
      document.getElementById('esewa_form').submit();
    }, 1000);
  </script>
</body>
</html>
